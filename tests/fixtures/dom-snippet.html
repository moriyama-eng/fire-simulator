<div id="summaryCardContainer" class="hidden"></div>
<input type="number" id="initialRiskAssetNum" value="1.0">
<input type="number" id="targetAssetRatioNum" value="100">
<input type="text" id="initialCashBufferNum" value="1,000">
<input type="number" id="monthlyExpenseNum" value="30">
<input type="number" id="expectedReturnNum" value="10.0">
<input type="number" id="volatilityNum" value="18.0">
<input type="number" id="inflationRateNum" value="2.0">
<input type="number" id="simYearsNum" value="30">
<input type="text" id="simPathsNum" value="10,000">
<input type="checkbox" id="cashBufferToggle" checked>
<input type="number" id="drawdownTriggerNum" value="-20.0">
<input type="number" id="drawdownReplenishNum" value="-5.0">
<input type="number" id="replenishPaceNum" value="5.0">
<input type="checkbox" id="guardrailToggle">

<input type="number" id="guardrailReductionNum" value="-20.0">
<select id="returnModelSelect">
    <option value="log-normal">対数正規分布</option>
    <option value="log-t" selected>対数t分布</option>
</select>
<input type="checkbox" id="simDfToggle" checked>
<input type="number" id="simDfNum" value="4.0">
<input type="checkbox" id="inflationModelToggle">
<input type="number" id="infVolNum" value="2.0">
<input type="number" id="infArNum" value="0.5">
<input type="checkbox" id="seedToggle" checked>
<input type="number" id="seedNum" value="123456">
<input type="text" id="percentileInput" value="10, 30, 50, 70, 90">
<button id="runBtn">シミュレーション実行</button>
<button id="shareXBtn" disabled>Xにポスト</button>
<button id="saveImageBtn" disabled>画像を保存</button>
<button id="openCompareTabBtn" disabled>同条件の別タブを開く</button>        
<button id="copySimUrlBtn" disabled>解析結果のURLリンクをコピー</button>
